[pytest]
# Pytest configuration for private-rag-assistant

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add current directory to Python path
pythonpath = .

# Output options
addopts = 
    -ra
    --strict-markers
    --disable-warnings
    --tb=short
    --json-report
    --json-report-file=test-results.json

# Markers
markers =
    requires_ollama: mark test as requiring Ollama service to be running
    requires_api_key: mark test as requiring an API key
    slow: mark test as slow running
    integration: mark test as an integration test
